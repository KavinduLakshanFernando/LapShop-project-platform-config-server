spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        git:
          uri: https://github.com/KavinduLakshanFernando/LapShop-project-configurations.git
          search-paths: platform,services
        native:
          search-locations:
            - classpath:/configurations
            - file:./configurations/platform
            - file:./configurations/services

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info
