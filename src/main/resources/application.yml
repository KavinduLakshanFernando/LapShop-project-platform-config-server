spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        git:
          uri: https://github.com/KavinduLakshanFernando/LapShop-project-configurations.git
          search-paths: platform,services
        native:
          search-locations: ${CONFIG_REPO_PATH:file:./config-repo,file:../config-repo,file:../../config-repo}

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info
